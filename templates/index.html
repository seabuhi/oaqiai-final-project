<!DOCTYPE html>
<html>
<head>
    <title>Emotion Detector</title>
</head>
<body>
    <h1>Emotion Detector</h1>
    <input type="text" id="textToAnalyze" placeholder="Enter text here" size="50">
    <button onclick="detectEmotion()">Detect Emotion</button>
    <p id="result"></p>
    <script>
        function detectEmotion() {
            var text = document.getElementById('textToAnalyze').value;
            fetch('/emotionDetector?textToAnalyze=' + text)
            .then(response => response.text())
            .then(data => document.getElementById('result').innerHTML = data);
        }
    </script>
</body>
</html>
